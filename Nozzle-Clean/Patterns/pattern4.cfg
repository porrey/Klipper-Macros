[gcode_macro _WIPE_PATTERN_NAME_4]
description: Displays the pattern name/description.
gcode:
  RESPOND TYPE=echo MSG="Pattern 4 is the Criss-Cross (X) wipe pattern"

[gcode_macro _WIPE_PATTERN_START_4]
description: Set the start position of the nozzle for wipe pattern 4
gcode:
  # Get macro parameters
  {% set wipe_axis  = (params.WIPE_AXIS|string)|upper %}
  {% set pad_x      = params.PAD_X|float %}
  {% set pad_y      = params.PAD_Y|float %}
  {% set pad_w      = params.PAD_W|float %}
  {% set pad_d      = params.PAD_D|float %}
  {% set travelxy_f = params.TRAVELXY_F|float %}

  # Pattern 4 always starts at the minimum corner (pad x,y) regardless of wipe axis.
  {% if wipe_axis == "X" or wipe_axis == "Y" %}
    G1 X{pad_x} Y{pad_y} F{travelxy_f}
  {% else %}
    {action_raise_error("_WIPE_PATTERN_START_4: WIPE_AXIS must be X or Y")}
  {% endif %}

[gcode_macro _WIPE_PATTERN_CLEAN_4]
description: Wipe the nozzle in a criss-cross (X) pattern across the pad
gcode:
  # Get macro parameters
  {% set wipe_axis = (params.WIPE_AXIS|string)|upper %}
  {% set pad_x     = params.PAD_X|float %}
  {% set pad_y     = params.PAD_Y|float %}
  {% set pad_w     = params.PAD_W|float %}
  {% set pad_d     = params.PAD_D|float %}
  {% set wipe_f    = params.WIPE_F|float %}
  {% set passes    = params.PASSES|int %}

  # Validate wipe axis
  {% if wipe_axis != "X" and wipe_axis != "Y" %}
    {action_raise_error("_WIPE_PATTERN_CLEAN_4: WIPE_AXIS must be X or Y")}
  {% endif %}

  # Compute the four corners of the pad
  {% set x0 = pad_x %}
  {% set y0 = pad_y %}
  {% set x1 = pad_x + pad_w %}
  {% set y1 = pad_y + pad_d %}

  # Loop the specified number of times (passes). Each pass traces the full X shape:
  #   1. From (x0, y0) diagonally to the opposite corner (x1, y1) crossing the long side.
  #   2. Move to the adjacent corner along the short edge.
  #   3. From that corner diagonally to the opposite corner along the long side.
  #   4. Move back to (x0, y0) along the short edge, completing the X.
  {% for i in range(passes) %}
    {% if wipe_axis == "X" %}
      # Long axis is X; short edge is along Y.

      # Step 1: Diagonal from (x0, y0) to opposite corner (x1, y1)
      G1 X{x1} Y{y1} F{wipe_f}

      # Step 2: Move to adjacent corner along the short (Y) edge
      G1 X{x1} Y{y0} F{wipe_f}

      # Step 3: Diagonal to opposite corner along the long side
      G1 X{x0} Y{y1} F{wipe_f}

      # Step 4: Return to start along the short (Y) edge
      G1 X{x0} Y{y0} F{wipe_f}
    {% elif wipe_axis == "Y" %}
      # Long axis is Y; short edge is along X.

      # Step 1: Diagonal from (x0, y0) to opposite corner (x1, y1)
      G1 X{x1} Y{y1} F{wipe_f}

      # Step 2: Move to adjacent corner along the short (X) edge
      G1 X{x0} Y{y1} F{wipe_f}

      # Step 3: Diagonal to opposite corner along the long side
      G1 X{x1} Y{y0} F{wipe_f}

      # Step 4: Return to start along the short (X) edge
      G1 X{x0} Y{y0} F{wipe_f}
    {% endif %}
  {% endfor %}
