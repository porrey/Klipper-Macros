# Pattern 5 - Pigtail Pattern
#   written by Daniel Porrey
#   v1.4.0
#   Last Updated: 4/4/2026
#   git: https://github.com/porrey/Klipper-Macros.git
#   License: (MIT) https://github.com/porrey/Klipper-Macros/blob/main/LICENSE
# --------------------------------------------------------------------------------------------------------------
# The pigtail pattern starts centered on the short edge of the pad and makes circular movements
# that progress along the long axis. On the return trip the circles are phase-shifted by 180°
# so they cover the portions of the pad not covered on the forward pass. One pass = the forward
# journey from one short edge to the other plus the return.
# --------------------------------------------------------------------------------------------------------------

[gcode_macro _WIPE_PATTERN_PARAMETERS_5]
description: Configuration parameters for Pattern 5.
# Behavior
variable_circle_count:        3  # Number of full circles per direction (must be >= 1)
variable_segments_per_circle: 16 # Line segments used to approximate each circle (more = smoother)

gcode:
  ; This macro only stores variables. No gcode required.

[gcode_macro _WIPE_PATTERN_NAME_5]
description: Displays the pattern name/description.
gcode:
  RESPOND TYPE=echo MSG="Pattern 5 is the Pigtail wipe pattern"

[gcode_macro _WIPE_PATTERN_START_5]
description: Set the start position of the nozzle for wipe pattern 5
gcode:
  # Get macro parameters
  {% set wipe_axis  = (params.WIPE_AXIS|string)|upper %}
  {% set pad_x      = params.PAD_X|float %}
  {% set pad_y      = params.PAD_Y|float %}
  {% set pad_w      = params.PAD_W|float %}
  {% set pad_d      = params.PAD_D|float %}
  {% set travelxy_f = params.TRAVELXY_F|float %}

  # Compute pad center
  {% set cx = pad_x + (pad_w / 2.0) %}
  {% set cy = pad_y + (pad_d / 2.0) %}

  # Move to the center of the short edge at the start of the long axis
  {% if wipe_axis == "X" %}
    G1 X{pad_x} Y{cy} F{travelxy_f}
  {% elif wipe_axis == "Y" %}
    G1 X{cx} Y{pad_y} F{travelxy_f}
  {% else %}
    {action_raise_error("_WIPE_PATTERN_START_5: WIPE_AXIS must be X or Y")}
  {% endif %}

[gcode_macro _WIPE_PATTERN_CLEAN_5]
description: Wipe the nozzle in a pigtail pattern (circular loops progressing along the long axis)
gcode:
  # Get macro parameters
  {% set wipe_axis = (params.WIPE_AXIS|string)|upper %}
  {% set pad_x     = params.PAD_X|float %}
  {% set pad_y     = params.PAD_Y|float %}
  {% set pad_w     = params.PAD_W|float %}
  {% set pad_d     = params.PAD_D|float %}
  {% set wipe_f    = params.WIPE_F|float %}
  {% set passes    = params.PASSES|int %}

  # Validate wipe axis
  {% if wipe_axis != "X" and wipe_axis != "Y" %}
    {action_raise_error("_WIPE_PATTERN_CLEAN_5: WIPE_AXIS must be X or Y")}
  {% endif %}

  # Get the configuration parameters
  {% set cfg = printer["gcode_macro _WIPE_PATTERN_PARAMETERS_5"] %}

  # Validate circle count
  {% if cfg.circle_count < 1 %}
    {action_raise_error("_WIPE_PATTERN_PARAMETERS_5: circle_count must be >= 1")}
  {% endif %}

  # Compute pad center
  {% set cx = pad_x + (pad_w / 2.0) %}
  {% set cy = pad_y + (pad_d / 2.0) %}

  # Amplitude = half the short dimension so circles reach both pad edges
  {% if wipe_axis == "X" %}
    {% set amplitude  = pad_d / 2.0 %}
    {% set travel_len = pad_w %}
  {% elif wipe_axis == "Y" %}
    {% set amplitude  = pad_w / 2.0 %}
    {% set travel_len = pad_d %}
  {% endif %}

  # Total number of line segments for the forward (or return) half of a pass
  {% set total_segs = cfg.circle_count * cfg.segments_per_circle %}

  # Loop through each pass.  One pass = forward pigtail + return pigtail.
  {% for p in range(passes) %}

    # ---- Forward sweep: circles progressing from start to end ----
    {% for i in range(total_segs) %}

      # Overall progress across the full pad length (0..1)
      {% set frac = i / total_segs %}

      # Fractional position within the current circle (0..1)
      {% set circle_frac = (i % cfg.segments_per_circle) / cfg.segments_per_circle %}

      # Piecewise-linear approximation of sin(2π * circle_frac).
      # This gives a diamond-shaped loop; increasing segments_per_circle smooths it.
      {% if circle_frac < 0.25 %}
        {% set sin_val = 4.0 * circle_frac %}
      {% elif circle_frac < 0.75 %}
        {% set sin_val = 2.0 - 4.0 * circle_frac %}
      {% else %}
        {% set sin_val = 4.0 * circle_frac - 4.0 %}
      {% endif %}

      # Short-axis offset (perpendicular to the wipe direction)
      {% set offset      = amplitude * sin_val %}

      # Long-axis position (along the wipe direction)
      {% set travel_pos  = frac * travel_len %}

      # Emit the motion
      {% if wipe_axis == "X" %}
        G1 X{pad_x + travel_pos} Y{cy + offset} F{wipe_f}
      {% elif wipe_axis == "Y" %}
        G1 X{cx + offset} Y{pad_y + travel_pos} F{wipe_f}
      {% endif %}

    {% endfor %}

    # Land exactly on the far end center before beginning the return
    {% if wipe_axis == "X" %}
      G1 X{pad_x + pad_w} Y{cy} F{wipe_f}
    {% elif wipe_axis == "Y" %}
      G1 X{cx} Y{pad_y + pad_d} F{wipe_f}
    {% endif %}

    # ---- Return sweep: circles from end back to start, phase-shifted by 180° ----
    # Negating sin_val shifts the phase by π so the return circles fill in the
    # areas between the forward circles, maximising pad coverage.
    {% for i in range(total_segs) %}

      # Overall progress along the return journey (0..1)
      {% set frac = i / total_segs %}

      # Fractional position within the current circle (0..1)
      {% set circle_frac = (i % cfg.segments_per_circle) / cfg.segments_per_circle %}

      # Same piecewise-linear sin approximation, negated for the 180° phase shift
      {% if circle_frac < 0.25 %}
        {% set sin_val = -(4.0 * circle_frac) %}
      {% elif circle_frac < 0.75 %}
        {% set sin_val = -(2.0 - 4.0 * circle_frac) %}
      {% else %}
        {% set sin_val = -(4.0 * circle_frac - 4.0) %}
      {% endif %}

      # Short-axis offset
      {% set offset     = amplitude * sin_val %}

      # Long-axis position (travelling from end back to start)
      {% set travel_pos = (1.0 - frac) * travel_len %}

      # Emit the motion
      {% if wipe_axis == "X" %}
        G1 X{pad_x + travel_pos} Y{cy + offset} F{wipe_f}
      {% elif wipe_axis == "Y" %}
        G1 X{cx + offset} Y{pad_y + travel_pos} F{wipe_f}
      {% endif %}

    {% endfor %}

    # Land exactly back at the start center to finish the pass
    {% if wipe_axis == "X" %}
      G1 X{pad_x} Y{cy} F{wipe_f}
    {% elif wipe_axis == "Y" %}
      G1 X{cx} Y{pad_y} F{wipe_f}
    {% endif %}

  {% endfor %}
