# Pattern 5 - Pigtail Pattern
#   written by Daniel Porrey
#   v1.4.0
#   Last Updated: 4/4/2026
#   git: https://github.com/porrey/Klipper-Macros.git
#   License: (MIT) https://github.com/porrey/Klipper-Macros/blob/main/LICENSE
# --------------------------------------------------------------------------------------------------------------
# The pigtail pattern traces N loops along the long axis of the pad. Each loop is an ellipse:
#   - Long semi-axis  = travel_len / (2 * circle_count)   [fits N loops end-to-end along the pad]
#   - Short semi-axis = half the pad's short dimension     [fills the pad width]
#
# Forward pass: traces the UPPER half of each loop, left → right (positive short-axis side).
# Return pass:  traces the LOWER half of each loop, right → left (negative short-axis side).
#
# Together, forward + return cover complementary halves of every loop so the full pad surface
# is wiped without retracing the same line. One PASSES iteration = forward + return.
# --------------------------------------------------------------------------------------------------------------

[gcode_macro _WIPE_PATTERN_PARAMETERS_5]
description: Configuration parameters for Pattern 5.
# Behavior
variable_circle_count:        3  # Number of loops (must be >= 1)
variable_segments_per_circle: 16 # Segments per half-loop (more = smoother)

gcode:
  ; This macro only stores variables. No gcode required.

[gcode_macro _WIPE_PATTERN_NAME_5]
description: Displays the pattern name/description.
gcode:
  RESPOND TYPE=echo MSG="Pattern 5 is the Pigtail wipe pattern"

[gcode_macro _WIPE_PATTERN_START_5]
description: Set the start position of the nozzle for wipe pattern 5
gcode:
  # Get macro parameters
  {% set wipe_axis  = (params.WIPE_AXIS|string)|upper %}
  {% set pad_x      = params.PAD_X|float %}
  {% set pad_y      = params.PAD_Y|float %}
  {% set pad_w      = params.PAD_W|float %}
  {% set pad_d      = params.PAD_D|float %}
  {% set travelxy_f = params.TRAVELXY_F|float %}

  # Compute pad center
  {% set cx = pad_x + (pad_w / 2.0) %}
  {% set cy = pad_y + (pad_d / 2.0) %}

  # Move to the center of the short edge at the start of the long axis
  {% if wipe_axis == "X" %}
    G1 X{pad_x} Y{cy} F{travelxy_f}
  {% elif wipe_axis == "Y" %}
    G1 X{cx} Y{pad_y} F{travelxy_f}
  {% else %}
    {action_raise_error("_WIPE_PATTERN_START_5: WIPE_AXIS must be X or Y")}
  {% endif %}

[gcode_macro _WIPE_PATTERN_CLEAN_5]
description: Wipe the nozzle in a pigtail pattern (elliptical loops progressing along the long axis)
gcode:
  # Get macro parameters
  {% set wipe_axis = (params.WIPE_AXIS|string)|upper %}
  {% set pad_x     = params.PAD_X|float %}
  {% set pad_y     = params.PAD_Y|float %}
  {% set pad_w     = params.PAD_W|float %}
  {% set pad_d     = params.PAD_D|float %}
  {% set wipe_f    = params.WIPE_F|float %}
  {% set passes    = params.PASSES|int %}

  # Validate wipe axis
  {% if wipe_axis != "X" and wipe_axis != "Y" %}
    {action_raise_error("_WIPE_PATTERN_CLEAN_5: WIPE_AXIS must be X or Y")}
  {% endif %}

  # Get the configuration parameters
  {% set cfg = printer["gcode_macro _WIPE_PATTERN_PARAMETERS_5"] %}

  # Validate circle count
  {% if cfg.circle_count < 1 %}
    {action_raise_error("_WIPE_PATTERN_PARAMETERS_5: circle_count must be >= 1")}
  {% endif %}

  # Compute pad center
  {% set cx = pad_x + (pad_w / 2.0) %}
  {% set cy = pad_y + (pad_d / 2.0) %}

  # Semi-axes of each loop
  # r_short: half the short dimension — loops fill the full pad width
  # r_long:  divides the long dimension evenly so N loops fit end-to-end
  {% if wipe_axis == "X" %}
    {% set r_short    = pad_d / 2.0 %}
    {% set travel_len = pad_w %}
  {% elif wipe_axis == "Y" %}
    {% set r_short    = pad_w / 2.0 %}
    {% set travel_len = pad_d %}
  {% endif %}
  {% set r_long = travel_len / (2.0 * cfg.circle_count) %}

  # Loop through each pass.  One pass = forward half-ellipses + return half-ellipses.
  {% for p in range(passes) %}

    # ---- Forward pass: upper half of each loop, left → right ----
    # Each loop c has its centre at (c + 0.5) * travel_len / circle_count along the long axis.
    # The upper half is parametrised by t ∈ [0, 1]:
    #   long_pos    = centre_long - r_long  * cos(π·t)   [left edge at t=0, right edge at t=1]
    #   short_offset = r_short * sin(π·t)                 [always ≥ 0 — positive/upper side]
    # Piecewise-linear approximations used for cos and sin because Klipper Jinja2 has no math lib.
    {% for c in range(cfg.circle_count) %}
      {% set centre_long = (c + 0.5) * travel_len / cfg.circle_count %}

      {% for k in range(cfg.segments_per_circle + 1) %}
        {% set t = k / cfg.segments_per_circle %}

        # cos(π·t):  1 → 0 → -1   (linear approximation is exact for this shape)
        {% set cos_h = 1.0 - 2.0 * t %}

        # sin(π·t):  0 → 1 → 0   (triangle-wave approximation)
        {% if t <= 0.5 %}
          {% set sin_h = 2.0 * t %}
        {% else %}
          {% set sin_h = 2.0 * (1.0 - t) %}
        {% endif %}

        {% set long_pos     = centre_long - r_long  * cos_h %}
        {% set short_offset = r_short * sin_h %}

        {% if wipe_axis == "X" %}
          G1 X{pad_x + long_pos} Y{cy + short_offset} F{wipe_f}
        {% elif wipe_axis == "Y" %}
          G1 X{cx + short_offset} Y{pad_y + long_pos} F{wipe_f}
        {% endif %}

      {% endfor %}
    {% endfor %}

    # ---- Return pass: lower half of each loop, right → left ----
    # The lower half is parametrised by t ∈ [0, 1] (traversed in reverse loop order):
    #   long_pos     = centre_long + r_long  * cos(π·t)   [right edge at t=0, left edge at t=1]
    #   short_offset = -r_short * sin(π·t)                 [always ≤ 0 — negative/lower side]
    {% for c in range(cfg.circle_count) %}
      # Iterate circles in reverse so we travel from the far end back to the start
      {% set c_rev = cfg.circle_count - 1 - c %}
      {% set centre_long = (c_rev + 0.5) * travel_len / cfg.circle_count %}

      {% for k in range(cfg.segments_per_circle + 1) %}
        {% set t = k / cfg.segments_per_circle %}

        # cos(π·t):  1 → 0 → -1
        {% set cos_h = 1.0 - 2.0 * t %}

        # sin(π·t):  0 → 1 → 0
        {% if t <= 0.5 %}
          {% set sin_h = 2.0 * t %}
        {% else %}
          {% set sin_h = 2.0 * (1.0 - t) %}
        {% endif %}

        {% set long_pos     = centre_long + r_long  * cos_h %}
        {% set short_offset = -r_short * sin_h %}

        {% if wipe_axis == "X" %}
          G1 X{pad_x + long_pos} Y{cy + short_offset} F{wipe_f}
        {% elif wipe_axis == "Y" %}
          G1 X{cx + short_offset} Y{pad_y + long_pos} F{wipe_f}
        {% endif %}

      {% endfor %}
    {% endfor %}

  {% endfor %}

