[gcode_macro _WIPE_PATTERN_PARAMETERS_3]
description: Configuration parameters for Pattern 3.
# Behavior
variable_loop_count: 3  # Number of concentric rectangles per pass (must be >= 1)

gcode:
  ; This macro only stores variables. No gcode required.

[gcode_macro _WIPE_PATTERN_NAME_3]
description: Displays the pattern name/description.
gcode:
  RESPOND TYPE=echo MSG="Pattern 3 is the Spiral Inward wipe pattern"

[gcode_macro _WIPE_PATTERN_START_3]
description: Set the start position of the nozzle for wipe pattern 3
gcode:
  # Get macro parameters
  {% set wipe_axis  = (params.WIPE_AXIS|string)|upper %}
  {% set pad_x      = params.PAD_X|float %}
  {% set pad_y      = params.PAD_Y|float %}
  {% set pad_w      = params.PAD_W|float %}
  {% set pad_d      = params.PAD_D|float %}
  {% set travelxy_f = params.TRAVELXY_F|float %}

  # Move to the front-left corner of the pad
  {% if wipe_axis == "X" or wipe_axis == "Y" %}
    G1 X{pad_x} Y{pad_y} F{travelxy_f}
  {% else %}
    {action_raise_error("_WIPE_PATTERN_START_3: WIPE_AXIS must be X or Y")}
  {% endif %}

[gcode_macro _WIPE_PATTERN_CLEAN_3]
description: Wipe the nozzle in a spiral inward pattern (concentric rectangles from edge to center)
gcode:
  # Get macro parameters
  {% set wipe_axis = (params.WIPE_AXIS|string)|upper %}
  {% set pad_x     = params.PAD_X|float %}
  {% set pad_y     = params.PAD_Y|float %}
  {% set pad_w     = params.PAD_W|float %}
  {% set pad_d     = params.PAD_D|float %}
  {% set wipe_f    = params.WIPE_F|float %}
  {% set passes    = params.PASSES|int %}

  # Validate wipe axis
  {% if wipe_axis != "X" and wipe_axis != "Y" %}
    {action_raise_error("_WIPE_PATTERN_CLEAN_3: WIPE_AXIS must be X or Y")}
  {% endif %}

  # Get the configuration parameters
  {% set cfg = printer["gcode_macro _WIPE_PATTERN_PARAMETERS_3"] %}

  # Compute the center of the pad
  {% set cx = pad_x + (pad_w / 2.0) %}
  {% set cy = pad_y + (pad_d / 2.0) %}

  # Compute the per-loop inset step so that after loop_count loops the
  # rectangle has shrunk to the center point of the pad
  {% set step_x = (pad_w / 2.0) / cfg.loop_count %}
  {% set step_y = (pad_d / 2.0) / cfg.loop_count %}

  # Loop through each pass
  {% for p in range(passes) %}

    # Loop through each concentric rectangle, moving inward on every iteration
    {% for i in range(cfg.loop_count) %}

      # Compute the inset for this iteration
      {% set inset_x = i * step_x %}
      {% set inset_y = i * step_y %}

      # Compute rectangle corners
      {% set xi0 = pad_x + inset_x %}
      {% set yi0 = pad_y + inset_y %}
      {% set xi1 = pad_x + pad_w - inset_x %}
      {% set yi1 = pad_y + pad_d - inset_y %}

      # Move to the front-left corner of this rectangle
      G1 X{xi0} Y{yi0} F{wipe_f}

      # Trace the rectangle clockwise
      G1 X{xi1} Y{yi0} F{wipe_f}
      G1 X{xi1} Y{yi1} F{wipe_f}
      G1 X{xi0} Y{yi1} F{wipe_f}
      G1 X{xi0} Y{yi0} F{wipe_f}

    {% endfor %}

    # Move to the center of the pad after completing all loops in this pass
    G1 X{cx} Y{cy} F{wipe_f}

  {% endfor %}
