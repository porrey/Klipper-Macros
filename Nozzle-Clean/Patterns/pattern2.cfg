[gcode_macro _WIPE_PATTERN_PARAMETERS_2]
description: Configuration parameters for Pattern 2.
# Behavior
variable_segments_per_wave: 12 # Segments per wave (more = smoother)
variable_wave_count:         2 # Number of full waves per pass

gcode:
  ; This macro only stores variables. No gcode required.
  
[gcode_macro _WIPE_PATTERN_NAME_2]
description: Displays the pattern name/description.
gcode:
  RESPOND TYPE=echo MSG="Pattern 2 is the Wave wipe pattern"

[gcode_macro _WIPE_PATTERN_START_2]
description: Set the start position of the nozzle for wipe pattern 2
gcode:
  # Get macro parameters
  {% set wipe_axis  = (params.WIPE_AXIS|string)|upper %}
  {% set pad_x      = params.PAD_X|float %}
  {% set pad_y      = params.PAD_Y|float %}
  {% set pad_w      = params.PAD_W|float %}
  {% set pad_d      = params.PAD_D|float %}
  {% set travelxy_f = params.TRAVELXY_F|float %}

  # Compute pad center
  {% set cx = pad_x + (pad_w / 2.0) %}
  {% set cy = pad_y + (pad_d / 2.0) %}

  # Move into the start position at the center of the non-wipe axis
  {% if wipe_axis == "X" %}
    G1 X{pad_x} Y{cy} F{travelxy_f}
  {% elif wipe_axis == "Y" %}
    G1 X{cx} Y{pad_y} F{travelxy_f}
  {% else %}
    {action_raise_error("_WIPE_PATTERN_START_2: WIPE_AXIS must be X or Y")}
  {% endif %}

[gcode_macro _WIPE_PATTERN_CLEAN_2]
description: Wipe the nozzle across the full length of the pad in a wave pattern
gcode:
  # Get macro parameters
  {% set wipe_axis = (params.WIPE_AXIS|string)|upper %}
  {% set pad_x     = params.PAD_X|float %}
  {% set pad_y     = params.PAD_Y|float %}
  {% set pad_w     = params.PAD_W|float %}
  {% set pad_d     = params.PAD_D|float %}
  {% set wipe_f    = params.WIPE_F|float %}
  {% set passes    = params.PASSES|int %}

  # Get the configuration parameters
  {% set params = printer["gcode_macro _WIPE_PATTERN_PARAMETERS_2"] %}

  # Compute pad center
  {% set cx = pad_x + (pad_w / 2.0) %}
  {% set cy = pad_y + (pad_d / 2.0) %}

  # Amplitude is half of the short dimension so the wave touches both edges
  {% if wipe_axis == "X" %}
    {% set amplitude = pad_d / 2.0 %}
    {% set travel_len = pad_w %}
  {% elif wipe_axis == "Y" %}
    {% set amplitude = pad_w / 2.0 %}
    {% set travel_len = pad_d %}
  {% else %}
    {action_raise_error("_WIPE_PATTERN_CLEAN_2: WIPE_AXIS must be X or Y")}
  {% endif %}

  # Keep track of pass direction
  {% set ns = namespace(moving_forward=1) %}

  # Loop through each pass
  {% for i in range(passes) %}

    # Build each wave
    {% for w in range(params.wave_count) %}
      {% for s in range(params.segments_per_wave) %}

        # local_t is 0..1 within the current wave
        {% set local_t = s / params.segments_per_wave %}

        # progress is 0..1 across the full pad length
        {% set progress = (w + local_t) / params.wave_count %}

        # Compute the wave offset.
        # This creates:
        # center -> positive edge -> center -> negative edge -> center
        {% if local_t < 0.25 %}
          {% set offset = amplitude * (local_t / 0.25) %}
        {% elif local_t < 0.50 %}
          {% set offset = amplitude * (1.0 - ((local_t - 0.25) / 0.25)) %}
        {% elif local_t < 0.75 %}
          {% set offset = -amplitude * ((local_t - 0.50) / 0.25) %}
        {% else %}
          {% set offset = -amplitude * (1.0 - ((local_t - 0.75) / 0.25)) %}
        {% endif %}

        # Compute the travel position along the pad
        {% if ns.moving_forward == 1 %}
          {% set travel_pos = progress * travel_len %}
        {% else %}
          {% set travel_pos = travel_len - (progress * travel_len) %}
        {% endif %}

        # Emit the motion
        {% if wipe_axis == "X" %}
          {% set x_pos = pad_x + travel_pos %}
          {% set y_pos = cy + offset %}
          G1 X{x_pos} Y{y_pos} F{wipe_f}
        {% elif wipe_axis == "Y" %}
          {% set x_pos = cx + offset %}
          {% set y_pos = pad_y + travel_pos %}
          G1 X{x_pos} Y{y_pos} F{wipe_f}
        {% endif %}

      {% endfor %}
    {% endfor %}

    # Finish each pass exactly centered at the far end
    {% if wipe_axis == "X" %}
      {% if ns.moving_forward == 1 %}
        G1 X{pad_x + pad_w} Y{cy} F{wipe_f}
      {% else %}
        G1 X{pad_x} Y{cy} F{wipe_f}
      {% endif %}
    {% elif wipe_axis == "Y" %}
      {% if ns.moving_forward == 1 %}
        G1 X{cx} Y{pad_y + pad_d} F{wipe_f}
      {% else %}
        G1 X{cx} Y{pad_y} F{wipe_f}
      {% endif %}
    {% endif %}

    # Toggle direction for next pass
    {% set ns.moving_forward = 1 - ns.moving_forward %}

  {% endfor %}